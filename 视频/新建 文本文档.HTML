<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>爱心</title>
    <style>
        html, body {
            height: 100%;
            padding: 0;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        h1 {
            width: 100%;
            color: hotpink;
            text-align: center;
            position: absolute;
            top: 45%;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <canvas id="pinkboard"></canvas>

    <!-- 重点：图片在这里！！！ -->
    <img src="2.jpg"
         width="200"
         style="
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index: 9999;
  ">

    

    <audio autoplay loop>
        <source src="./恋爱告急.mp3">
    </audio>

    <script>
        var settings = {
            particles: { length: 500, duration: 2, velocity: 100, effect: -0.75, size: 30 },
        };
        (function () { var b = 0; var c = ["ms", "moz", "webkit", "o"]; for (var a = 0; a < c.length && !window.requestAnimationFrame; ++a) { window.requestAnimationFrame = window[c[a] + "RequestAnimationFrame"]; window.cancelAnimationFrame = window[c[a] + "CancelAnimationFrame"] || window[c[a] + "CancelRequestAnimationFrame"] } if (!window.requestAnimationFrame) { window.requestAnimationFrame = function (h, e) { var d = new Date().getTime(); var f = Math.max(0, 16 - (d - b)); var g = window.setTimeout(function () { h(d + f) }, f); b = d + f; return g } } if (!window.cancelAnimationFrame) { window.cancelAnimationFrame = function (d) { clearTimeout(d) } } }());
        var Point = (function () {
            function Point(x, y) { this.x = x || 0; this.y = y || 0; }
            Point.prototype.clone = function () { return new Point(this.x, this.y); };
            Point.prototype.length = function (length) {
                if (typeof length == 'undefined') return Math.sqrt(this.x * this.x + this.y * this.y);
                this.normalize(); this.x *= length; this.y *= length; return this;
            };
            Point.prototype.normalize = function () { var l = this.length(); this.x /= l; this.y /= l; return this; };
            return Point;
        })();
        var Particle = (function () {
            function Particle() { this.position = new Point(); this.velocity = new Point(); this.acceleration = new Point(); this.age = 0; }
            Particle.prototype.initialize = function (x, y, dx, dy) {
                this.position.x = x; this.position.y = y; this.velocity.x = dx; this.velocity.y = dy;
                this.acceleration.x = dx * settings.particles.effect;
                this.acceleration.y = dy * settings.particles.effect;
                this.age = 0;
            };
            Particle.prototype.update = function (deltaTime) {
                this.position.x += this.velocity.x * deltaTime;
                this.position.y += this.velocity.y * deltaTime;
                this.velocity.x += this.acceleration.x * deltaTime;
                this.velocity.y += this.acceleration.y * deltaTime;
                this.age += deltaTime;
            };
            Particle.prototype.draw = function (context, image) {
                function ease(t) { return (--t) * t * t + 1 }
                var size = image.width * ease(this.age / settings.particles.duration);
                context.globalAlpha = 1 - this.age / settings.particles.duration;
                context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
            };
            return Particle;
        })();
        var ParticlePool = (function () {
            var particles, firstActive = 0, firstFree = 0, duration = settings.particles.duration;
            function ParticlePool(length) {
                particles = new Array(length);
                for (var i = 0; i < particles.length; i++) particles[i] = new Particle();
            }
            ParticlePool.prototype.add = function (x, y, dx, dy) {
                particles[firstFree].initialize(x, y, dx, dy);
                firstFree++; if (firstFree == particles.length) firstFree = 0;
                if (firstActive == firstFree) firstActive++;
                if (firstActive == particles.length) firstActive = 0;
            };
            ParticlePool.prototype.update = function (deltaTime) {
                var i;
                if (firstActive < firstFree) { for (i = firstActive; i < firstFree; i++) particles[i].update(deltaTime); }
                if (firstFree < firstActive) {
                    for (i = firstActive; i < particles.length; i++) particles[i].update(deltaTime);
                    for (i = 0; i < firstFree; i++) particles[i].update(deltaTime);
                }
                while (particles[firstActive].age >= duration && firstActive != firstFree) {
                    firstActive++; if (firstActive == particles.length) firstActive = 0;
                }
            };
            ParticlePool.prototype.draw = function (context, image) {
                if (firstActive < firstFree) { for (i = firstActive; i < firstFree; i++) particles[i].draw(context, image); }
                if (firstFree < firstActive) {
                    for (i = firstActive; i < particles.length; i++) particles[i].draw(context, image);
                    for (i = 0; i < firstFree; i++) particles[i].draw(context, image);
                }
            };
            return ParticlePool;
        })();
        (function (canvas) {
            var context = canvas.getContext('2d'),
                particles = new ParticlePool(settings.particles.length),
                rate = settings.particles.length / settings.particles.duration, time;
            function heart(t) {
                return new Point(
                  160 * Math.pow(Math.sin(t), 3),
                  130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25
                );
            }
            var img = (function () {
                var c = document.createElement('canvas'), ctx = c.getContext('2d');
                c.width = settings.particles.size; c.height = settings.particles.size;
                function to(t) {
                    var p = heart(t);
                    p.x = settings.particles.size / 2 + p.x * settings.particles.size / 350;
                    p.y = settings.particles.size / 2 - p.y * settings.particles.size / 350;
                    return p;
                }
                ctx.beginPath();
                var t = -Math.PI, p = to(t);
                ctx.moveTo(p.x, p.y);
                while (t < Math.PI) { t += 0.01; p = to(t); ctx.lineTo(p.x, p.y); }
                ctx.closePath();
                ctx.fillStyle = '#ea80b0';
                ctx.fill();
                var image = new Image();
                image.src = c.toDataURL();
                return image;
            })();
            function render() {
                requestAnimationFrame(render);
                var now = new Date().getTime() / 1000, dt = now - (time || now); time = now;
                context.clearRect(0, 0, canvas.width, canvas.height);
                var amount = rate * dt;
                for (var i = 0; i < amount; i++) {
                    var p = heart(Math.PI - 2 * Math.PI * Math.random());
                    var d = p.clone().length(settings.particles.velocity);
                    particles.add(canvas.width / 2 + p.x, canvas.height / 2 - p.y, d.x, -d.y);
                }
                particles.update(dt);
                particles.draw(context, img);
            }
            function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
            window.onresize = resize;
            setTimeout(function () { resize(); render(); }, 10);
        })(document.getElementById('pinkboard'));
    </script>
</body>
</html>
